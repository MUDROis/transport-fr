<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Budget — Pie Chart | MUDRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --light: #ecf0f1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--primary);
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            padding: 30px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--accent); margin-bottom: 20px; }
        .chart-container {
            position: relative;
            height: 400px;
            margin: 20px auto;
            max-width: 500px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }
        .back-btn:hover { background: #c0392b; }
        .budget-summary {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .budget-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .budget-item:last-child { border-bottom: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Travel Budget Breakdown</h1>
        <p style="margin-bottom: 15px;">Visualize your travel expenses</p>
        
        <div class="chart-container">
            <canvas id="budgetChart"></canvas>
        </div>
        
        <div class="budget-summary">
            <h3 style="margin-bottom: 10px;">Budget Summary</h3>
            <div class="budget-item"><span>🚆 Transport</span><span>€120</span></div>
            <div class="budget-item"><span>🏨 Accommodation</span><span>€200</span></div>
            <div class="budget-item"><span>🍽️ Food</span><span>€150</span></div>
            <div class="budget-item"><span>🎯 Activities</span><span>€80</span></div>
            <div class="budget-item"><span>🛍️ Shopping</span><span>€50</span></div>
            <div class="budget-item"><span>Total</span><span>€600</span></div>
        </div>
        
        <a href="index.html" class="back-btn">← Back to Lesson</a>
    </div>

    <script>
        const ctx = document.getElementById('budgetChart').getContext('2d');
        const budgetChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Transport', 'Accommodation', 'Food', 'Activities', 'Shopping'],
                datasets: [{
                    data: [120, 200, 150, 80, 50],
                    backgroundColor: [
                        '#3498db',
                        '#9b59b6',
                        '#e74c3c',
                        '#2ecc71',
                        '#f39c12'
                    ],
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            font: { size: 14 },
                            padding: 15
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const value = context.raw;
                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                const percentage = ((value / total) * 100).toFixed(1);
                                return `${context.label}: €${value} (${percentage}%)`;
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
