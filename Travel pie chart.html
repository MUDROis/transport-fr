<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Budget Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #5a6c7d;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #8898aa;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .input-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .input-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .input-group:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #5a6c7d;
            font-size: 1.1em;
        }

        .icon {
            font-size: 1.3em;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        #transportInput { border-color: #A8D8EA; }
        #foodInput { border-color: #FFB380; }
        #funInput { border-color: #FFB3CC; }
        #accommodationInput { border-color: #B8E8D0; }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 30px;
        }

        .total-budget {
            text-align: center;
            font-size: 1.5em;
            color: #5a6c7d;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .total-budget strong {
            color: #667eea;
            font-size: 1.3em;
        }

        .reset-btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: #5568d3;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Travel Budget</h1>
        <p class="subtitle">Plan your trip expenses</p>

        <div class="input-section">
            <div class="input-group">
                <label>
                    <span class="icon">✈️</span>
                    Transport
                </label>
                <input type="number" id="transportInput" placeholder="Enter amount" value="300" min="0">
            </div>

            <div class="input-group">
                <label>
                    <span class="icon">🍽️</span>
                    Food
                </label>
                <input type="number" id="foodInput" placeholder="Enter amount" value="250" min="0">
            </div>

            <div class="input-group">
                <label>
                    <span class="icon">🎉</span>
                    Fun
                </label>
                <input type="number" id="funInput" placeholder="Enter amount" value="200" min="0">
            </div>

            <div class="input-group">
                <label>
                    <span class="icon">🏠</span>
                    Accommodation
                </label>
                <input type="number" id="accommodationInput" placeholder="Enter amount" value="400" min="0">
            </div>
        </div>

        <div class="chart-container">
            <canvas id="budgetChart"></canvas>
        </div>

        <div class="total-budget">
            Total Budget: <strong id="totalAmount">$1,150</strong>
        </div>

        <button class="reset-btn" onclick="resetValues()">Reset to Default</button>
    </div>

    <script>
        // Pastel colors matching the infographic
        const colors = {
            transport: '#A8D8EA',
            food: '#FFB380',
            fun: '#FFB3CC',
            accommodation: '#B8E8D0'
        };

        // Initialize chart
        const ctx = document.getElementById('budgetChart').getContext('2d');
        let budgetChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Transport', 'Food', 'Fun', 'Accommodation'],
                datasets: [{
                    data: [300, 250, 200, 400],
                    backgroundColor: [
                        colors.transport,
                        colors.food,
                        colors.fun,
                        colors.accommodation
                    ],
                    borderWidth: 3,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 15,
                            font: {
                                size: 14,
                                family: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
                            },
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                label += '$' + context.parsed.toFixed(2);
                                
                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                const percentage = ((context.parsed / total) * 100).toFixed(1);
                                label += ' (' + percentage + '%)';
                                
                                return label;
                            }
                        }
                    }
                },
                animation: {
                    animateScale: true,
                    animateRotate: true
                }
            }
        });

        // Update chart on input change
        const inputs = {
            transport: document.getElementById('transportInput'),
            food: document.getElementById('foodInput'),
            fun: document.getElementById('funInput'),
            accommodation: document.getElementById('accommodationInput')
        };

        function updateChart() {
            const values = [
                parseFloat(inputs.transport.value) || 0,
                parseFloat(inputs.food.value) || 0,
                parseFloat(inputs.fun.value) || 0,
                parseFloat(inputs.accommodation.value) || 0
            ];

            budgetChart.data.datasets[0].data = values;
            budgetChart.update();

            // Update total
            const total = values.reduce((a, b) => a + b, 0);
            document.getElementById('totalAmount').textContent = '$' + total.toLocaleString();
        }

        // Add event listeners
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', updateChart);
        });

        // Reset function
        function resetValues() {
            inputs.transport.value = 300;
            inputs.food.value = 250;
            inputs.fun.value = 200;
            inputs.accommodation.value = 400;
            updateChart();
        }

        // Initialize total
        updateChart();
    </script>
</body>
</html>
